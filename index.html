<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>UCL Manager | Hall of Fame Edition</title>
    <style>
        :root {
            --ucl-blue: #000c2d;
            --ucl-accent: #00d4ff;
            --ucl-gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 0% 0%, #001c4d 0%, #000514 100%);
            color: #fff; margin: 0; padding: 20px; min-height: 100vh;
        }

        .scoreboard-global {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;
            padding: 15px; background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 15px;
            position: relative;
        }
        .player-stat { text-align: center; min-width: 120px; }
        .player-stat h2 { margin: 0; font-size: 12px; color: var(--ucl-accent); text-transform: uppercase; }
        .player-stat .count { font-size: 32px; font-weight: 800; }
        .player-stat button { background: none; border: 1px solid var(--ucl-accent); color: var(--ucl-accent); border-radius: 10px; cursor: pointer; font-size: 10px; padding: 2px 8px; margin-top: 5px; }
        
        .btn-reset-score {
            position: absolute; bottom: 8px; right: 15px; background: none; border: none; 
            color: rgba(255,255,255,0.2); cursor: pointer; font-size: 9px; text-transform: uppercase;
        }
        .btn-reset-score:hover { color: #ff4444; }

        .setup-section {
            max-width: 1100px; margin: 0 auto 40px; text-align: center;
            background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border);
        }

        textarea {
            width: 100%; height: 80px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px;
        }

        .hall-of-fame-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;
            margin: 20px auto;
        }

        .hof-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; height: 400px; display: flex; flex-direction: column;
        }

        .hof-card h3 { color: var(--ucl-gold); margin-top: 0; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; font-size: 16px; }
        .table-wrapper { overflow-y: auto; flex-grow: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--ucl-accent); padding: 8px; border-bottom: 1px solid var(--glass-border); }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .manual-input {
            display: flex; gap: 5px; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--glass-border);
        }
        .manual-input input {
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            color: #fff; padding: 5px; border-radius: 5px; flex: 1; font-size: 11px;
        }

        .grid-grupos { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .grupo { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; }
        
        .jogos-area { 
            display: flex; align-items: flex-start; gap: 10px; 
            margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--glass-border);
        }
        .inputs-placar { display: flex; flex-direction: column; gap: 5px; }
        .labels-confronto { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        .confronto-text { font-size: 11px; height: 21px; display: flex; align-items: center; color: #ccc; overflow: hidden; white-space: nowrap; }

        .diagrama-container { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; }
        .fase-col { flex: 1; min-width: 220px; }
        .match-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-left: 3px solid var(--ucl-accent); margin-bottom: 10px; padding: 10px; border-radius: 8px; }
        .team-row { display: flex; justify-content: space-between; margin: 5px 0; }
        input[type="number"] { width: 35px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; border-radius: 4px; }
        
        .win-check { cursor: pointer; width: 20px; height: 20px; border: 1px solid var(--ucl-accent); border-radius: 50%; text-align: center; font-size: 10px; line-height: 18px; display: inline-block; }
        .win-check.active { background: var(--ucl-gold); border-color: var(--ucl-gold); color: #000; }
        
        .btn-main { background: linear-gradient(90deg, #00d4ff, #0055ff); color: #fff; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn-view { background: var(--ucl-accent); color: #000; border: none; padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 12px; padding: 0 5px; }

        .campeao-final { display: none; text-align: center; padding: 40px; border: 2px solid var(--ucl-gold); border-radius: 20px; margin-top: 20px; background: rgba(0,0,0,0.5); }
        .hidden { display: none; }
        .view-only-mode input { pointer-events: none; border-color: transparent !important; }
        .view-only-mode .no-print, .view-only-mode .btn-main { display: none !important; }
        .view-only-mode #btn-voltar { display: block !important; position: fixed; top: 20px; left: 20px; z-index: 999; }
        .export-box { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <button id="btn-voltar" class="btn-main" style="display:none;" onclick="location.reload()">⬅️ Voltar ao Menu</button>

    <div id="main-menu">
        <div class="scoreboard-global no-print">
            <div class="player-stat"><h2>Gonçalo</h2><div class="count" id="win-goncalo">0</div><button onclick="updateGlobalScore('goncalo')">+ Vit</button></div>
            <div style="font-size: 20px; align-self: center; color: var(--ucl-gold);">VS</div>
            <div class="player-stat"><h2>Tomás</h2><div class="count" id="win-tomas">0</div><button onclick="updateGlobalScore('tomas')">+ Vit</button></div>
            <button class="btn-reset-score" onclick="resetGlobalScore()">Reiniciar Placar</button>
        </div>

        <div id="setup" class="setup-section no-print">
            <h1>🏆 Champions Management</h1>
            <textarea id="listaEquipas">Real Madrid&#10;Manchester City&#10;Bayern&#10;PSG&#10;Inter&#10;Benfica&#10;Porto&#10;Sporting&#10;Arsenal&#10;Barcelona&#10;Dortmund&#10;Atletico&#10;Napoli&#10;Liverpool&#10;Leverkusen&#10;Juventus&#10;Milan&#10;Aston Villa&#10;Leipzig&#10;Monaco&#10;PSV&#10;Feyenoord&#10;Shakhtar&#10;Celtic</textarea>
            <br>
            <button class="btn-main" onclick="gerarTorneio()">Sortear Torneio</button>

            <div class="hall-of-fame-grid">
                <div class="hof-card">
                    <h3>📜 Histórico de Finais</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Campeão</th><th>Finalista</th></tr></thead>
                            <tbody id="lista-finais"></tbody>
                        </table>
                    </div>
                    <div class="manual-input">
                        <input type="text" id="man-venc" placeholder="Vencedor">
                        <input type="text" id="man-perdeu" placeholder="2º Lugar">
                        <button class="btn-main" style="padding: 5px 10px;" onclick="addFinalManual()">+</button>
                    </div>
                </div>

                <div class="hof-card">
                    <h3>🏆 Ranking Títulos</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Clube</th><th>Títulos</th></tr></thead>
                            <tbody id="ranking-clubes"></tbody>
                        </table>
                    </div>
                </div>

                <div class="hof-card">
                    <h3>📅 Arquivo de Torneios</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Data</th><th>Final</th><th>Ações</th></tr></thead>
                            <tbody id="log-torneios"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="torneio" class="hidden">
        <div class="grid-grupos" id="containerGrupos"></div>
        <div style="text-align: center; margin: 30px;" class="no-print"><button id="btn-apurar" class="btn-main" onclick="apurarOitavos()">Apurar Oitavos</button></div>
        
        <div id="eliminatorias" class="hidden">
            <div class="diagrama-container">
                <div class="fase-col" id="col-oitavos"><h4>Oitavos</h4></div>
                <div class="fase-col" id="col-quartos"><h4>Quartos</h4></div>
                <div class="fase-col" id="col-meias"><h4>Meias</h4></div>
                <div class="fase-col" id="col-final"><h4>Final</h4></div>
            </div>
        </div>

        <div id="quadro-campeao" class="campeao-final">
            <div style="font-size: 50px;">🏆</div>
            <h1 id="nome-campeao">---</h1>
            <p id="info-vice" style="color: #aaa; margin-bottom: 20px;"></p>
            <button class="btn-main" id="btn-finalizar" style="background: var(--ucl-gold); color: #000;" onclick="salvarTorneioCompleto()">Registar e Sair</button>
        </div>
    </div>

    <div class="export-box no-print hidden" id="pdfBtnBox">
        <button class="btn-main" style="background: #238636;" onclick="window.print()">📄 Tirar PDF</button>
    </div>

    <script>
        const iniciais = [
            {v:"Manchester United", p:"Porto"}, {v:"Barcelona", p:"Juventus"},
            {v:"Atletico Madrid", p:"Manchester United"}, {v:"Inter", p:"Atletico Madrid"},
            {v:"Napoles", p:"Atletico Madrid"}, {v:"Bayern", p:"Porto"},
            {v:"Liverpool", p:"Arsenal"}, {v:"Real Madrid", p:"Porto"},
            {v:"Manchester City", p:"Dortmund"}, {v:"Inter", p:"Atletico Madrid"},
            {v:"Bayer L.", p:"Arsenal"}, {v:"Manchester United", p:"Barcelona"},
            {v:"Dortmund", p:"Juventus"}, {v:"Sporting", p:"Real Madrid"},
            {v:"Miami", p:"Real Madrid"}, {v:"Spurs", p:"Inter"},
            {v:"Barcelona", p:"Real Madrid"}, {v:"Real Madrid", p:"Liverpool"},
            {v:"PSG", p:"Sporting"}, {v:"Manchester City", p:"Galatasaray"}
        ];

        let historico = JSON.parse(localStorage.getItem('fifa_hof')) || iniciais;
        let historicoCompleto = JSON.parse(localStorage.getItem('ucl_full_history')) || [];
        let scores = JSON.parse(localStorage.getItem('fifa_records')) || { goncalo: 0, tomas: 0 };
        let viceCampeaoGlobal = "";

        function renderHOF() {
            document.getElementById('win-goncalo').innerText = scores.goncalo;
            document.getElementById('win-tomas').innerText = scores.tomas;
            const listaFinais = document.getElementById('lista-finais');
            const rankingTable = document.getElementById('ranking-clubes');
            const logTorneios = document.getElementById('log-torneios');
            
            listaFinais.innerHTML = '';
            logTorneios.innerHTML = '';
            let contagem = {};

            // INVERTIDO: Criamos uma cópia do histórico e invertemos para mostrar os últimos em cima
            [...historico].reverse().forEach(f => {
                listaFinais.innerHTML += `<tr><td>⭐ <b>${f.v}</b></td><td>${f.p}</td></tr>`;
            });

            // Contagem para o ranking (mantém a lógica normal baseada no histórico real)
            historico.forEach(f => {
                contagem[f.v] = (contagem[f.v] || 0) + 1;
            });

            historicoCompleto.forEach((torneio, index) => {
                logTorneios.innerHTML += `<tr>
                    <td>${torneio.data}</td>
                    <td>${torneio.v}</td>
                    <td style="white-space:nowrap">
                        <button class="btn-view" onclick="verTorneioAntigo(${index})">👁️</button>
                        <button class="btn-delete" onclick="apagarRegistoCompleto(${index})">🗑️</button>
                    </td>
                </tr>`;
            });

            rankingTable.innerHTML = '';
            Object.keys(contagem).sort((a,b) => contagem[b] - contagem[a]).forEach(clube => {
                rankingTable.innerHTML += `<tr><td>${clube}</td><td><b>${contagem[clube]}</b> 🏆</td></tr>`;
            });
        }

        function updateGlobalScore(p) { scores[p]++; localStorage.setItem('fifa_records', JSON.stringify(scores)); renderHOF(); }
        function resetGlobalScore() { if(confirm("Reiniciar placar?")) { scores = { goncalo: 0, tomas: 0 }; localStorage.setItem('fifa_records', JSON.stringify(scores)); renderHOF(); } }
        
        function addFinalManual() {
            const v = document.getElementById('man-venc').value;
            const p = document.getElementById('man-perdeu').value;
            if(v && p) { 
                historico.push({v: v, p: p}); 
                localStorage.setItem('fifa_hof', JSON.stringify(historico)); 
                renderHOF(); 
            }
            document.getElementById('man-venc').value = "";
            document.getElementById('man-perdeu').value = "";
        }

        function salvarTorneioCompleto() {
            const campeao = document.getElementById('nome-campeao').innerText;
            const dataAgora = new Date().toLocaleString('pt-PT', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            const estrutura = document.getElementById('torneio').innerHTML;
            const inputsData = Array.from(document.querySelectorAll('#torneio input')).map(i => ({
                val: i.value,
                active: i.parentElement.querySelector('.win-check')?.classList.contains('active') || false
            }));
            
            const novoRegisto = { v: campeao, p: viceCampeaoGlobal, data: dataAgora, html: estrutura, inputs: inputsData };
            
            historicoCompleto.unshift(novoRegisto);
            localStorage.setItem('ucl_full_history', JSON.stringify(historicoCompleto));
            
            historico.push({v: campeao, p: viceCampeaoGlobal});
            localStorage.setItem('fifa_hof', JSON.stringify(historico));
            
            location.reload();
        }

        function gerarTorneio() {
            const input = document.getElementById('listaEquipas').value;
            const equipas = input.split('\n').map(e => e.trim()).filter(e => e !== "");
            if(equipas.length < 24) return alert("Precisas de 24 equipas!");
            equipas.sort(() => Math.random() - 0.5);
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('torneio').classList.remove('hidden');
            const container = document.getElementById('containerGrupos');
            container.innerHTML = "";
            const letras = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
            
            letras.forEach(L => {
                const e = [equipas.shift(), equipas.shift(), equipas.shift()];
                container.innerHTML += `<div class="grupo" id="g-${L}">
                    <h3>Grupo ${L}</h3>
                    <table>
                        <tr id="row-${L}-0"><td>${e[0]}</td><td class="p">0</td><td class="dg">0</td></tr>
                        <tr id="row-${L}-1"><td>${e[1]}</td><td class="p">0</td><td class="dg">0</td></tr>
                        <tr id="row-${L}-2"><td>${e[2]}</td><td class="p">0</td><td class="dg">0</td></tr>
                    </table>
                    <div class="jogos-area no-print">
                        <div class="inputs-placar">
                            <div><input type="number" onchange="calc('${L}')"> x <input type="number" onchange="calc('${L}')"></div>
                            <div><input type="number" onchange="calc('${L}')"> x <input type="number" onchange="calc('${L}')"></div>
                            <div><input type="number" onchange="calc('${L}')"> x <input type="number" onchange="calc('${L}')"></div>
                        </div>
                        <div class="labels-confronto">
                            <div class="confronto-text">⬅️ ${e[0]} vs ${e[1]}</div>
                            <div class="confronto-text">⬅️ ${e[1]} vs ${e[2]}</div>
                            <div class="confronto-text">⬅️ ${e[2]} vs ${e[0]}</div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function calc(L) {
            const g = document.getElementById(`g-${L}`); 
            const inputs = g.querySelectorAll('input[type="number"]');
            let s = [{p:0, dg:0}, {p:0, dg:0}, {p:0, dg:0}];
            const f = (a, b, g1, g2) => {
                if(g1==="" || g2==="") return;
                let v1 = parseInt(g1), v2 = parseInt(g2);
                s[a].dg += (v1-v2); s[b].dg += (v2-v1);
                if(v1>v2) s[a].p+=3; else if(v2>v1) s[b].p+=3; else {s[a].p++; s[b].p++;}
            };
            f(0, 1, inputs[0].value, inputs[1].value); f(1, 2, inputs[2].value, inputs[3].value); f(2, 0, inputs[4].value, inputs[5].value);
            for(let i=0; i<3; i++) { 
                g.querySelector(`#row-${L}-${i} .p`).innerText = s[i].p; 
                g.querySelector(`#row-${L}-${i} .dg`).innerText = s[i].dg; 
            }
        }

        function apurarOitavos() {
            document.getElementById('eliminatorias').classList.remove('hidden');
            document.getElementById('pdfBtnBox').classList.remove('hidden');
            const letras = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
            let ap = {};
            letras.forEach(L => {
                let l = [];
                for(let i=0; i<3; i++) { 
                    const r = document.getElementById(`row-${L}-${i}`); 
                    l.push({ n: r.cells[0].innerText, p: parseInt(r.cells[1].innerText), dg: parseInt(r.cells[2].innerText) }); 
                }
                l.sort((a,b) => b.p - a.p || b.dg - a.dg); 
                ap[L] = { p: l[0].n, s: l[1].n };
            });
            const cruzamentos = [[ap.A.p, ap.B.s], [ap.B.p, ap.A.s], [ap.C.p, ap.D.s], [ap.D.p, ap.C.s], [ap.E.p, ap.F.s], [ap.F.p, ap.E.s], [ap.G.p, ap.H.s], [ap.H.p, ap.G.s]];
            const cont = document.getElementById('col-oitavos'); cont.innerHTML = '<h4>Oitavos</h4>';
            cruzamentos.forEach((jogo, i) => {
                cont.innerHTML += `<div class="match-card" id="m-o-${i}">
                    <div class="team-row"><input type="text" value="${jogo[0]}" readonly><input type="number" onchange="avancar('o',${i},'q')"><span class="win-check" onclick="forcar('o',${i},0,'q')">V</span></div>
                    <div class="team-row"><input type="text" value="${jogo[1]}" readonly><input type="number" onchange="avancar('o',${i},'q')"><span class="win-check" onclick="forcar('o',${i},1,'q')">V</span></div></div>`;
            });
            preGerar('q', 4, 'Quartos', 'm'); preGerar('m', 2, 'Meias', 'f'); preGerar('f', 1, 'Final', 'w');
        }

        function preGerar(f, n, t, p) {
            const c = document.getElementById(`col-${{q:'quartos',m:'meias',f:'final'}[f]}`); c.innerHTML = `<h4>${t}</h4>`;
            for(let i=0; i<n; i++) {
                c.innerHTML += `<div class="match-card" id="m-${f}-${i}">
                    <div class="team-row"><input type="text" placeholder="..." readonly><input type="number" onchange="avancar('${f}',${i},'${p}')"><span class="win-check" onclick="forcar('${f}',${i},0,'${p}')">V</span></div>
                    <div class="team-row"><input type="text" placeholder="..." readonly><input type="number" onchange="avancar('${f}',${i},'${p}')"><span class="win-check" onclick="forcar('${f}',${i},1,'${p}')">V</span></div></div>`;
            }
        }

        function avancar(f, i, p) {
            const m = document.getElementById(`m-${f}-${i}`); 
            const n = m.querySelectorAll('input[type="text"]'), s = m.querySelectorAll('input[type="number"]'), checks = m.querySelectorAll('.win-check');
            checks[0].classList.remove('active'); checks[1].classList.remove('active');
            if(s[0].value === "" || s[1].value === "") return;
            let v1 = parseInt(s[0].value), v2 = parseInt(s[1].value);
            if (v1 > v2) { checks[0].classList.add('active'); pass(n[0].value, i, p, n[1].value); } 
            else if (v2 > v1) { checks[1].classList.add('active'); pass(n[1].value, i, p, n[0].value); }
        }

        function forcar(f, i, idx, p) {
            const m = document.getElementById(`m-${f}-${i}`); 
            const n = m.querySelectorAll('input[type="text"]'), checks = m.querySelectorAll('.win-check');
            if(n[idx].value === "" || n[idx].value === "...") return;
            checks[0].classList.remove('active'); checks[1].classList.remove('active'); 
            checks[idx].classList.add('active');
            pass(n[idx].value, i, p, n[1-idx].value);
        }

        function pass(v, i, p, perdeu) {
            if(p==='w') { 
                document.getElementById('quadro-campeao').style.display = 'block'; 
                document.getElementById('nome-campeao').innerText = v; 
                document.getElementById('info-vice').innerText = "Finalista: " + perdeu;
                viceCampeaoGlobal = perdeu; 
                return; 
            }
            const pm = document.getElementById(`m-${p}-${Math.floor(i/2)}`);
            pm.querySelectorAll('input[type="text"]')[i%2].value = v;
        }

        function apagarRegistoCompleto(index) {
            if(confirm("Apagar este torneio do histórico?")) {
                const item = historicoCompleto[index];
                const hIndex = historico.findIndex(h => h.v === item.v && h.p === item.p);
                if(hIndex > -1) historico.splice(hIndex, 1);
                historicoCompleto.splice(index, 1);
                localStorage.setItem('ucl_full_history', JSON.stringify(historicoCompleto));
                localStorage.setItem('fifa_hof', JSON.stringify(historico));
                renderHOF();
            }
        }

        function verTorneioAntigo(index) {
            const t = historicoCompleto[index];
            document.getElementById('main-menu').classList.add('hidden');
            document.body.classList.add('view-only-mode');
            const container = document.getElementById('torneio');
            container.classList.remove('hidden');
            container.innerHTML = t.html;
            const novosInputs = container.querySelectorAll('input');
            const checks = container.querySelectorAll('.win-check');
            t.inputs.forEach((dados, i) => {
                if(novosInputs[i]) novosInputs[i].value = dados.val;
                if(checks[i] && dados.active) checks[i].classList.add('active');
            });
            document.getElementById('eliminatorias').classList.remove('hidden');
            document.getElementById('quadro-campeao').style.display = 'block';
            document.getElementById('btn-voltar').style.display = 'block';
            document.getElementById('btn-finalizar').style.display = 'none';
            if(document.getElementById('btn-apurar')) document.getElementById('btn-apurar').style.display = 'none';
            window.scrollTo(0,0);
        }

        renderHOF();
    </script>
</body>
</html>
